services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aep-orchestrator
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/aep-orchestrator?authSource=admin
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - aep-network
    restart: unless-stopped
    volumes:
      - .:/app
  # ==================== MONGODB DATABASE ====================
  mongodb:
    image: mongo:6.0
    container_name: aep-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: aep-orchestrator
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/mongodb-init.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - aep-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== REDIS CACHE ====================
  redis:
    image: redis:7-alpine
    container_name: aep-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis_data:/data
    networks:
      - aep-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== ZOOKEEPER (Kafka Dependency) ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: aep-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 5
      ZOOKEEPER_INIT_LIMIT: 10
    ports:
      - "2181:2181"
    networks:
      - aep-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== KAFKA MESSAGE BROKER ====================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: aep-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - aep-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ==================== KAFKA UI (Optional - for monitoring) ====================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aep-kafka-ui
    depends_on:
      - kafka
      - zookeeper
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aep-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - aep-network
    restart: unless-stopped

  # ==================== MONGODB EXPRESS UI (Optional - for DB monitoring) ====================
  mongo-express:
    image: mongo-express:latest
    container_name: aep-mongo-express
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    networks:
      - aep-network
    restart: unless-stopped

networks:
  aep-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

# ==================== SERVICE REFERENCE ====================
# Application:      http://localhost:5000
# API Health:       http://localhost:5000/health
# Kafka UI:         http://localhost:8080
# MongoDB Express:  http://localhost:8081 (admin/admin123)
# Zookeeper:        localhost:2181
# Kafka:            localhost:9092 (external), kafka:29092 (internal)
# MongoDB:          mongodb://admin:admin123@localhost:27017/aep-orchestrator
# Redis:            redis://localhost:6379
