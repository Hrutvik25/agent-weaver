services:

  # ==================== NGINX API GATEWAY ====================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: aep-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - aep-network
    restart: unless-stopped

  # ==================== REACT FRONTEND ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aep-frontend
    expose:
      - "8080"
    networks:
      - aep-network
    restart: unless-stopped

  # ==================== NODE.JS BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aep-orchestrator
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/aep-orchestrator
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - aep-network
    restart: unless-stopped

  # ==================== MONGODB ====================
  mongodb:
    image: mongo:6.0
    container_name: aep-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: aep-orchestrator
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./backend/scripts/mongodb-init.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - aep-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: aep-redis
    expose:
      - "6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - aep-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== ZOOKEEPER ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: aep-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - aep-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== KAFKA ====================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: aep-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - aep-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ==================== OPTIONAL: MONITORING UIs ====================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aep-kafka-ui
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aep-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - aep-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: aep-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - aep-network
    restart: unless-stopped

networks:
  aep-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:

# ==================== SERVICE REFERENCE ====================
# App (via Nginx):    http://localhost
# API (via Nginx):    http://localhost/api/
# Health Check:       http://localhost/health
# Kafka UI:           http://localhost:8082
# MongoDB Express:    http://localhost:8081  (admin/admin123)
